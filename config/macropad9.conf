# Nombre del teclado (opcional, ayuda a identificarlo en Bluetooth)
CONFIG_ZMK_KEYBOARD_NAME="Macropad 9"

# Aumentar la potencia de transmisión de Bluetooth (ayuda si hay interferencias)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# DESACTIVAMOS el sueño profundo para pruebas
# Esto asegura que el teclado no se apague mientras intentás emparejarlo
CONFIG_ZMK_SLEEP=n

# Habilitar soporte para USB (para probar con cable si el BT falla)
CONFIG_ZMK_USB=y
